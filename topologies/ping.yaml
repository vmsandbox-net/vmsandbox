docs:
  - id: readme
    title: Lab Instructions
    x: 40
    'y': 60
    width: 324
    height: 804
    markdown: |
      ## Ping Lab

      This lab demonstrates ICMP ping between a client and three servers connected to a shared switch.

      ### Network layout

      - Server 1: `10.0.0.1`
      - Server 2: `10.0.0.2`
      - Server 3: `10.0.0.3`
      - Client: `10.0.0.50`

      ### Steps

      1. Wait for the client VM to boot.

      2. Ping server 1:

      ```send-vm:client
      ping -c 1 10.0.0.1
      ```

      3. Ping server 2:

      ```send-vm:client
      ping -c 1 10.0.0.2
      ```

      4. Ping server 3 — this server is not connected to the switch, so it should not respond:

      ```send-vm:client
      ping -c 1 -w 1 10.0.0.3
      ```

      **Drag a wire from port 3 of the switch to eth0 of server 3** to connect it, then try again:

      ```send-vm:client
      ping -c 1 10.0.0.3
      ```

      ---

      **Note:** All VMs are on the same subnet, so ARP broadcasts are visible to all hosts. Unicast frames are delivered only to the destination port once the switch has learned the MAC address.

      ### Next steps

      ```goto:chat
      IRC Chat Lab →
      ```

      Or keep going with the advanced topic below.

      ---

      ## Hub vs Switch

      So far you have used a **switch** — a device that learns which MAC address lives on each port and sends frames only to the right destination.
      
      A **hub** is much simpler: it repeats every incoming frame out every other port with no forwarding intelligence at all.

      ### Step 1 — Add a hub and reconnect the hosts

      1. Click the 'x' button on the switch to remove it.
      2. Press the '+' button on the canvas to add a **Hub**. Then connect the hosts to it:
      3. Drag the wire from **Client** to the **Hub**.
      4. Drag the wire from **Server 1** to the **Hub**.
      5. Drag the wire from **Server 2** to the **Hub**.
      6. Drag the wire from **Server 3** to the **Hub**.

      ### Step 2 — Repeat the ping

      ```send-vm:client
      ping -c 4 10.0.0.2
      ```

      This time with a hub in place of the switch, Server 1's `tcpdump` shows **every frame** — ARP requests, ARP replies, and every ICMP echo and reply. The hub has no forwarding table; it repeats every signal to all ports, so every connected host sees every conversation.

      This is why hubs are both a performance concern (every host processes every frame) and a security concern (passive sniffing requires no special access).

      ### Next steps

      ```goto:chat
      IRC Chat Lab →
      ```
default_window: readme
