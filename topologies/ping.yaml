title: Ping
vms:
  - id: server1
    title: Server 1 (10.0.0.1)
    x: 1094
    'y': 60
    cols: 96
    rows: 25
    files:
      init.sh: |
        #!/bin/sh
        hostname server1
        echo 1 > /proc/sys/net/ipv6/conf/all/disable_ipv6
        echo 1 > /proc/sys/net/ipv6/conf/default/disable_ipv6
        ip link set lo up
        ip link set eth0 up
        ip addr add 10.0.0.1/24 dev eth0
        dmesg -n 1
      startup.sh: |
        export TERM=xterm-256color
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        PS1='\[\033[31m\]\u\[\033[0m\]@\[\033[32m\]$(hostname)\[\033[0m\]:\w# '

        CONSOLE=$(tty)
        if [ "$CONSOLE" = "/dev/hvc0" ]; then
          printf '\033]30;server1\007'
          clear
          echo "Waiting for pings..."
          tcpdump -l -n -q -i eth0 'icmp and src 10.0.0.50' -c 1 >/dev/null 2>&1
          /usr/local/bin/fireworks 10
          echo "Got a ping from 10.0.0.50!"
          tcpdump -l -v -i eth0
        fi
