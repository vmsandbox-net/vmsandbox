title: etcd
vms:
  - id: server1
    title: Server 1 (10.0.0.1)
    x: 1150
    'y': 59
    cols: 100
    rows: 15
    files:
      init.sh: |
        #!/bin/sh
        hostname server1
        echo 1 > /proc/sys/net/ipv6/conf/all/disable_ipv6
        echo 1 > /proc/sys/net/ipv6/conf/default/disable_ipv6
        ip link set lo up
        ip link set eth0 up
        ip addr add 10.0.0.1/24 dev eth0
        ip route add default via 10.0.0.100
        cp /run/init/hosts /etc/hosts
        dmesg -n 1
      startup.sh: |
        export TERM=xterm-256color
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        export ETCD_UNSUPPORTED_ARCH=riscv64
        PS1='\[\033[31m\]\u\[\033[0m\]@\[\033[32m\]$(hostname)\[\033[0m\]:\w# '

        CONSOLE=$(tty)
        if [ "$CONSOLE" = "/dev/hvc0" ]; then
          printf '\033]30;server1\007'
          clear
          echo "Server 1 ready (10.0.0.1). Start etcd using the instructions panel."
        fi
      hosts: |
        127.0.0.1  localhost
        10.0.0.1   server1
        10.0.0.2   server2
        10.0.0.3   server3
        10.0.0.50  client1
        10.0.0.51  client2
