        10.0.0.1   primary
        10.0.0.2   replica
        10.0.0.50  client

switches:
  - id: switch1
    title: "Switch"
    ports: 3
    x: 750
    y: 700

wires:
  - vm:
      id: client
      iface: eth0
    hub:
      id: switch1
      port: 0
  - vm:
      id: primary
