default_window: readme

docs:
  - id: readme
    title: "Lab Instructions"
    x: 40
    y: 60
    width: 370
    height: 950
    markdown: |
      ## PostgreSQL Streaming Replication Lab

      This lab demonstrates Write-Ahead Logging (WAL)-based streaming replication between a primary and a hot standby replica. The client can write to the primary and read from either node — with the replica accepting read-only queries while continuously replaying streamed WAL segments.

      ### Network layout

      - Primary: `10.0.0.1` (read/write)
      - Replica: `10.0.0.2` (hot standby, read-only)
      - Client: `10.0.0.50` (runs psql)

      ### Step 1: Start PostgreSQL on the primary

      ```send-vm:primary
      pg_ctlcluster 17 main start
      ```
      (this may take a few seconds, wait for the shell prompt to return before continuing)

      ```send-vm:primary
      pg_isready
      ```

      ### Step 2: Create the replication user and demo database

      ```send-vm:primary
      psql -U postgres -c "CREATE USER replicator REPLICATION LOGIN;"
      ```

      ```send-vm:primary
      psql -U postgres -c "CREATE DATABASE demo;"
      ```

      ```send-vm:primary
      psql -U postgres -d demo \
        -c "CREATE TABLE events (
              id  SERIAL PRIMARY KEY,
              msg TEXT,
              ts  TIMESTAMPTZ DEFAULT now()
            );"
      ```

      ### Step 3: Connect from the client

      Insert some rows into the `events` table on the primary:

      ```send-vm:client
      psql -h primary -U postgres -d demo \
        -c "INSERT INTO events (msg)
            VALUES ('hello'), ('world'), ('from client');"
      ```

      Query the rows back:

      ```send-vm:client
      psql -h primary -U postgres -d demo \
        -c "SELECT * FROM events ORDER BY id;"
      ```

      ### Step 4: Bootstrap the replica with pg_basebackup

      Drop the empty auto-created cluster, take a full base backup from the primary, then start the standby. The `-R` flag writes `standby.signal` and `primary_conninfo` automatically.

      ```send-vm:replica
      pg_ctlcluster 17 main stop 2>/dev/null; rm -rf /var/lib/postgresql/17/main
      ```

      ```send-vm:replica
      su -s /bin/sh postgres \
        -c "pg_basebackup -h primary -U replicator \
              -D /var/lib/postgresql/17/main -P -Xs -R -c fast"
      ```

      ```send-vm:replica
      pg_ctlcluster 17 main start
      ```

      ### Step 5: Verify streaming replication on the primary

      The `pg_stat_replication` view shows connected standbys and their lag:

      ```send-vm:primary
      psql -U postgres -x \
        -c "SELECT client_addr, state,
                   sent_lsn, write_lsn, flush_lsn, replay_lsn,
                   write_lag, flush_lag, replay_lag
            FROM pg_stat_replication;"
      ```

      ### Step 6: Write data from the client

      ```send-vm:client
      psql -h primary -U postgres -d demo \
        -c "INSERT INTO events (msg) VALUES ('Hello from primary');"
      ```

      ```send-vm:client
      psql -h primary -U postgres -d demo \
        -c "INSERT INTO events (msg) VALUES ('Replication test');"
      ```

      ### Step 7: Read from the replica (hot standby)

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "SELECT * FROM events ORDER BY id;"
      ```

      ### Step 8: Monitor replication lag

      ```send-vm:client
      watch -n 2 "psql -h primary -U postgres \
        -c \"SELECT client_addr, state, replay_lag
             FROM pg_stat_replication;\""
      ```

      ### Step 9: Inspect WAL settings

      Check the replication configuration on the primary:

      ```send-vm:primary
      psql -U postgres \
        -c "SELECT name, setting, unit FROM pg_settings
            WHERE name IN (
              'wal_level', 'max_wal_senders',
              'wal_keep_size', 'archive_mode'
            );"
      ```

      Confirm the replica is in recovery mode:

      ```send-vm:replica
      psql -U postgres \
        -c "SELECT pg_is_in_recovery(),
                   pg_last_wal_receive_lsn(),
                   pg_last_wal_replay_lsn();"
      ```

      ### Step 10: Simulate primary failure

      Stop PostgreSQL on the primary to simulate a node failure:

      ```send-vm:primary
      pg_ctlcluster 17 main stop
      ```

      ### Step 11: Test the replica while the primary is down

      Reads from the replica still work — the standby serves its local copy of the data:

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "SELECT * FROM events ORDER BY id;"
      ```

      Writes to the replica fail — it is still in read-only recovery mode:

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "INSERT INTO events (msg) VALUES ('write during outage');"
      ```

      Confirm the replica is still in recovery:

      ```send-vm:replica
      psql -U postgres \
        -c "SELECT pg_is_in_recovery();"
      ```

      ### Step 12: Promote the replica to primary

      ```send-vm:replica
      pg_ctlcluster 17 main promote
      ```

      Confirm recovery has ended:

      ```send-vm:replica
      psql -U postgres \
        -c "SELECT pg_is_in_recovery();"
      ```

      ### Step 13: Test reads and writes on the promoted replica

      Reads still work:

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "SELECT * FROM events ORDER BY id;"
      ```

      Writes now succeed — the promoted node is a full read/write primary:

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "INSERT INTO events (msg) VALUES ('write after promotion');"
      ```

      ```send-vm:client
      psql -h replica -U postgres -d demo \
        -c "SELECT * FROM events ORDER BY id;"
      ```

      ### Next steps

      ```goto:the-end
      The End →
      ```
