title: "PostgreSQL"
vms:
  - id: primary
    title: "Primary (10.0.0.1)"
    x: 1230
    y: 60
    cols: 100
    rows: 18
    files:
      init.sh: |
        #!/bin/sh
        hostname primary
        echo 1 > /proc/sys/net/ipv6/conf/all/disable_ipv6
        echo 1 > /proc/sys/net/ipv6/conf/default/disable_ipv6
        ip link set lo up
        ip link set eth0 up
        ip addr add 10.0.0.1/24 dev eth0
        cp /run/init/hosts /etc/hosts
        dmesg -n 1
        pg_lsclusters | grep -q '17.*main' || pg_createcluster 17 main
        PG_CONF=/etc/postgresql/17/main/postgresql.conf
        PG_CONF_CHANGED=0
        if ! grep -q '^listen_addresses' "$PG_CONF"; then
          echo "listen_addresses = '*'" >> "$PG_CONF"
          echo "wal_level = replica" >> "$PG_CONF"
          echo "max_wal_senders = 5" >> "$PG_CONF"
          echo "wal_keep_size = 64" >> "$PG_CONF"
          PG_CONF_CHANGED=1
        fi
        PG_HBA=/etc/postgresql/17/main/pg_hba.conf
        sed -i '/^local[[:space:]]*all[[:space:]]*postgres[[:space:]]*peer/s/peer/trust/' "$PG_HBA"
        PG_HBA_CHANGED=0
        if ! grep -q 'replicator' "$PG_HBA"; then
          echo "host  replication  replicator  10.0.0.0/24  trust" >> "$PG_HBA"
          echo "host  all          postgres    10.0.0.0/24  trust" >> "$PG_HBA"
          PG_HBA_CHANGED=1
        fi
        echo "$PG_CONF_CHANGED" > /run/pg_conf_changed
        echo "$PG_HBA_CHANGED" > /run/pg_hba_changed
      startup.sh: |
        export TERM=xterm-256color
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        PS1='\[\033[31m\]\u\[\033[0m\]@\[\033[32m\]$(hostname)\[\033[0m\]:\w# '

        CONSOLE=$(tty)
        if [ "$CONSOLE" = "/dev/hvc0" ]; then
          printf '\033]30;primary\007'
          PG_CONF_CHANGED=$(cat /run/pg_conf_changed 2>/dev/null || echo 0)
          PG_HBA_CHANGED=$(cat /run/pg_hba_changed 2>/dev/null || echo 0)
          clear
          echo "Primary ready (10.0.0.1). Use the instructions panel to start PostgreSQL."
          echo ""
          echo "Config changes:"
          [ "$PG_CONF_CHANGED" = 1 ] \
            && echo "  postgresql.conf: listen_addresses=*, wal_level=replica, max_wal_senders=5, wal_keep_size=64" \
            || echo "  postgresql.conf: already configured"
          echo "  pg_hba.conf: local postgres peer -> trust"
          [ "$PG_HBA_CHANGED" = 1 ] \
            && echo "  pg_hba.conf: added replication + postgres trust for 10.0.0.0/24" \
            || echo "  pg_hba.conf: already configured"
        fi

      hosts: |
        127.0.0.1  localhost
        10.0.0.1   primary
        10.0.0.2   replica
        10.0.0.50  client

