  - id: readme
    title: Lab Instructions
    x: 40
    'y': 60
    width: 362
    height: 901
    markdown: |
      ## Routing Lab

      We are in **kansas**, and we want to ping **somewhere**. Between **kansas** and **somewhere** is a chain of routers: **red**, **orange**, **green**, and **blue**.

      Each router sits on two subnets — one facing the previous hop and one facing the next. Your job is to configure each one to forward packets along the chain.

      ### Topology
      ```
      +------------------+
      |  Kansas          |
      +----- 1.0.0.1 ----+
                |
      +----- 1.0.0.2 ----+
      |  Red             |
      +----- 2.0.0.1 ----+
                |
      +----- 2.0.0.2 ----+
      |  Orange          |
      +----- 3.0.0.1 ----+
                |
      +----- 3.0.0.2 ----+
      |  Green           |
      +----- 4.0.0.1 ----+
                |
      +----- 4.0.0.2 ----+
      |  Blue            |
      +----- 5.0.0.1 ----+
                |
      +----- 5.0.0.2 ----+
      |  Somewhere       |
      +------------------+
      ```

      ### Step 1 — Verify that **kansas** can connect to **red**

      **kansas** and **red** share subnet `1.0.0.0/24` — this should work immediately:

      ```send-vm:kansas
      ping -c 1 1.0.0.2
      ```

      ### Step 2 — Try to reach Somewhere

      **kansas** has no route to `5.0.0.0/24`, so the packet never leaves:

      ```send-vm:kansas
      ping -c 4 5.0.0.2
      ```

      ### Step 3 — Add routes on the endpoints

      Tell each VM how to forward traffic for `5.0.0.0/24`:

      ```send-vm:kansas
      ip route add 5.0.0.0/24 via 1.0.0.2
      ```

      ```send-vm:red
      ip route add 5.0.0.0/24 via 2.0.0.2
      ```

      ```send-vm:orange
      ip route add 5.0.0.0/24 via 3.0.0.2
      ```

      ```send-vm:green
      ip route add 5.0.0.0/24 via 4.0.0.2
      ```

      Still fails — the routers don't forward yet:

      ```send-vm:kansas
      ping -w 2 5.0.0.2
      ```

      ### Step 4 — Enable forwarding

      ```send-vm:red
      echo 1 > /proc/sys/net/ipv4/ip_forward
      ```

      ```send-vm:orange
      echo 1 > /proc/sys/net/ipv4/ip_forward
      ```

      ```send-vm:green
      echo 1 > /proc/sys/net/ipv4/ip_forward
      ```

      ```send-vm:blue
      echo 1 > /proc/sys/net/ipv4/ip_forward
      ```

      Still fails — return traffic is not routed:

      ```send-vm:kansas
      ping -w 2 5.0.0.2
      ```

      ### Step 5 — Add return routes

      ```send-vm:somewhere
      ip route add 1.0.0.0/24 via 5.0.0.1
      ```

      ```send-vm:blue
      ip route add 1.0.0.0/24 via 4.0.0.1
      ```

      ```send-vm:green
      ip route add 1.0.0.0/24 via 3.0.0.1
      ```

      ```send-vm:orange
      ip route add 1.0.0.0/24 via 2.0.0.1
      ```

      ### Step 6 — You've found Somewhere!

      ```send-vm:kansas
      ping -c 4 5.0.0.2
      ```

      ### Step 7 — Traceroute

      Watch the packet hop through every router:

      ```send-vm:kansas
      traceroute 5.0.0.2
      ```

      ### Next steps

      ```goto:etcd
      etcd Lab →
      ```

      Or keep going with the advanced topic below.

      ---

      ## BGP Peering

      Static routes work well for small, stable networks. **BGP (Border Gateway Protocol)** is how the internet routes at scale: each autonomous system (AS) announces the IP prefixes it owns to its neighbors, and those announcements propagate and withdraw automatically.

      In this section you will bring an **ISP** router online, establish a BGP session between **kansas** and the ISP, and have the ISP advertise a remote prefix that kansas can reach.

      ### Step 1 — Connect the ISP

      The ISP VM (`10.1.0.2`) is placed on the canvas but not yet wired. Drag a wire from **kansas eth1** to **ISP eth0**.

      Then configure the peering link on kansas:

      ```send-vm:kansas
      ip link set eth1 up
      ip addr add 10.1.0.1/30 dev eth1
      ```

      Verify basic connectivity to the ISP:

      ```send-vm:kansas
      ping -c 2 10.1.0.2
      ```

      ### Step 2 — Configure BIRD on the ISP

      The ISP will advertise `203.0.113.0/24` (a reserved documentation prefix) via BGP. Write the BIRD config and start the daemon:

      ```send-vm:isp
      cat > /etc/bird/bird.conf << 'EOF'
      router id 10.1.0.2;

      protocol kernel {
        ipv4 { export all; };
      }

      protocol device {}

      protocol static remote_net {
        ipv4;
        route 203.0.113.0/24 blackhole;
      }

      protocol bgp kansas {
        local 10.1.0.2 as 65002;
        neighbor 10.1.0.1 as 65001;
        ipv4 {
          import none;
          export where proto = "remote_net";
        };
      }
      EOF
      bird
      ```

      ### Step 3 — Configure BIRD on kansas

      ```send-vm:kansas
      cat > /etc/bird/bird.conf << 'EOF'
      router id 1.0.0.1;

      protocol kernel {
        ipv4 { export all; };
      }

      protocol device {}

      protocol bgp isp {
        local 10.1.0.1 as 65001;
        neighbor 10.1.0.2 as 65002;
        ipv4 {
          import all;
          export none;
        };
      }
      EOF
      bird
      ```

      ### Step 4 — Verify the BGP session

      After a few seconds the peers exchange OPEN messages and transition to `Established`:

      ```send-vm:kansas
      birdc show protocols
      ```

      ### Step 5 — Inspect the learned route

      ```send-vm:kansas
      birdc show route
      ```

      `203.0.113.0/24` should appear with `[bgp isp]` as the source. Confirm the kernel also installed it:

      ```send-vm:kansas
      ip route show
      ```

      ### Step 6 — Test reachability

      ```send-vm:kansas
      ping -c 4 203.0.113.1
      ```

      The ISP uses a `blackhole` route for that prefix so you will receive no replies — but the pings leave kansas without a "Network unreachable" error, confirming BGP installed a working route.

      ### Step 7 — Withdraw the route

      Stop BIRD on the ISP to simulate a route withdrawal:

      ```send-vm:isp
      birdc down
      ```

      Wait a few seconds, then check kansas's routing table:

      ```send-vm:kansas
      ip route show
      ```

      The `203.0.113.0/24` entry disappears — BGP has automatically withdrawn the route and the kernel table is updated.

      ### Next steps

      ```goto:etcd
      etcd Lab →
      ```
default_window: readme
