title: Routing
vms:
  - id: kansas
    title: 'kansas (eth0: 1.0.0.1)'
    x: 440
    'y': 60
    cols: 68
    rows: 8
    eth_ports: 4
    files:
      init.sh: |
        #!/bin/sh
        hostname kansas
        echo 1 > /proc/sys/net/ipv6/conf/all/disable_ipv6
        echo 1 > /proc/sys/net/ipv6/conf/default/disable_ipv6
        ip link set lo up
        ip link set eth0 up
        ip addr add 1.0.0.1/24 dev eth0
        cp /run/init/hosts /etc/hosts
        mkdir -p /run/bird
        dmesg -n 1
      startup.sh: |
        export TERM=xterm-256color
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        PS1='\[\033[97m\]kansas\[\033[0m\]:\w# '

        CONSOLE=$(tty)
        if [ "$CONSOLE" = "/dev/hvc0" ]; then
          printf '\033]30;kansas\007'
          clear
        fi
      hosts: |
        127.0.0.1  localhost
        1.0.0.1    kansas
        1.0.0.2    red
        2.0.0.2    orange
        3.0.0.2    green
        4.0.0.2    blue
        5.0.0.2    somewhere
