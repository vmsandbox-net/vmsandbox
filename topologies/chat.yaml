title: IRC Chat
vms:
  - id: alexvm
    title: Alex's VM (10.0.0.1)
    x: 40
    'y': 579
    cols: 68
    rows: 20
    files:
      init.sh: |
        #!/bin/sh
        hostname alexvm
        echo 1 > /proc/sys/net/ipv6/conf/all/disable_ipv6
        echo 1 > /proc/sys/net/ipv6/conf/default/disable_ipv6
        ip link set lo up
        ip link set eth0 up
        ip addr add 10.0.0.1/24 dev eth0
        cp /run/init/hosts /etc/hosts
        dmesg -n 1
      startup.sh: |
        export TERM=xterm-256color
        alias ls='ls --color=auto'
        alias ll='ls -alF'
        PS1='\[\033[31m\]\u\[\033[0m\]@\[\033[32m\]$(hostname)\[\033[0m\]:\w# '

        CONSOLE=$(tty)
        if [ "$CONSOLE" = "/dev/hvc0" ]; then
          printf '\033]30;alexvm\007'
          clear
          echo "Run 'irssi -c 10.0.0.50 -n alex' to connect to the IRC server."
        fi
      hosts: |
        127.0.0.1  localhost
        10.0.0.1   alexvm
        10.0.0.2   blakevm
        10.0.0.3   caseyvm
        10.0.0.4   davisvm
        10.0.0.50  server1
        10.0.0.51  server2
